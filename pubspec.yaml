name: vaultx
description: VaultX - A zero-knowledge, fully offline password manager with military-grade encryption.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_secure_storage: 9.2.4
  local_auth: 2.3.0
  uuid: ^4.0.0
  path_provider: ^2.1.0
  pointycastle: ^3.9.1
  argon2: ^1.0.1
  file_picker: 8.1.3
  share_plus: 10.1.4
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg